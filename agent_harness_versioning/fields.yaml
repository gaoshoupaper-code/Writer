field_categories:
  - category: 基本信息
    fields:
      - name: name
        description: 对象名称
        detail_level: 极简
        required: true
      - name: type
        description: 类型（学术系统/开源工具/SaaS平台/框架）
        detail_level: 极简
      - name: org
        description: 出品方
        detail_level: 极简
      - name: release_date
        description: 发布或活跃时间
        detail_level: 简要
      - name: open_source
        description: 是否开源 + 仓库地址
        detail_level: 简要

  - category: 版本载体
    fields:
      - name: artifact_storage
        description: 进化/迭代产物【存在哪里】（git仓库/独立repo/同仓子目录/OCI制品/对象存储/数据库）
        detail_level: 详细
      - name: version_unit
        description: 一个"版本"的载体是什么（git commit/目录快照/内容指纹/DB记录/OCI digest）
        detail_level: 详细
      - name: schema
        description: 产物的组织形式（单文件/包目录/config+code分离/manifest）
        detail_level: 简要

  - category: 回溯能力
    fields:
      - name: rollback_mechanism
        description: 回滚机制（label重指向/git revert/git checkout/指针改指/快照恢复）
        detail_level: 详细
      - name: lineage_retention
        description: 谱系/历史如何保留，坏版本是否可查（是否删历史）
        detail_level: 详细
      - name: reproducibility
        description: 任意旧版本能否被精确重建/复现，怎么做到
        detail_level: 简要

  - category: 一致性
    fields:
      - name: write_read_isolation
        description: 写端（进化）与读端（执行）如何隔离，只读约束怎么实现
        detail_level: 详细
      - name: consistency_model
        description: 怎么保证写完之后读端能看到一致的内容（pull/push/通知/轮询/reconcile）
        detail_level: 简要

  - category: 防爆炸
    fields:
      - name: dedup_mechanism
        description: 去重机制（内容指纹 tree hash/语义指纹/哈希）
        detail_level: 详细
      - name: version_trigger
        description: 版本触发策略（内容变才发/每次运行都发/定时/手动）
        detail_level: 简要

  - category: 安全门控
    fields:
      - name: eval_gate
        description: eval 门控机制（评分阈值/回归测试/红队/人工审批）
        detail_level: 详细
      - name: safety_guardrail
        description: 安全护栏（沙箱/只读FS/签名校验/权限隔离/防恶意代码）
        detail_level: 详细
      - name: anti_regression
        description: 防退化机制（对比基线/性能不降才通过/红队对抗）
        detail_level: 简要

  - category: 架构与适用性
    fields:
      - name: architecture_pattern
        description: 整体架构模式（GitOps/registry/monorepo+plugin/artifact store）
        detail_level: 简要
      - name: cognitive_load
        description: 认知负担与落地复杂度评价（是否简单清晰）
        detail_level: 简要
      - name: relevance_to_writer
        description: 与 Writer 进化系统的同构度/可借鉴点（具体到 harness 版本管理）
        detail_level: 详细

uncertain: []
