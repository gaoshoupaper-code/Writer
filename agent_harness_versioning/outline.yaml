topic: 业界 Agent 工程如何实现自进化 Agent 定义的版本管理、存储、回溯、一致性、安全门控
slug: agent_harness_versioning
time_range: 2025-01 至 2026-07
items:
  # ── A. 自进化 / 自修改 Agent 系统（最贴近 Writer 进化端）──
  - name: Darwin Gödel Machine (DGM)
    category: 自进化Agent系统
    description: Sakana AI 的自改进 coding agent，直接重写自身代码、archive 保留全部变体、frontier 筛选。与"进化端改 harness"几乎同构。
  - name: Voyager
    category: 自进化Agent系统
    description: NVIDIA Minecraft agent，skill library 归档复用代码技能，新技能入库、错误技能不删。对应 skills/ 子目录管理。
  - name: AlphaEvolve / FunSearch
    category: 自进化Agent系统
    description: DeepMind 进化算法+LLM，完整 lineage 保留，坏个体不擦除只淘汰。谱系管理范本。
  - name: Eureka
    category: 自进化Agent系统
    description: NVIDIA LLM 自动生成 reward + 进化筛选，eval 门控决定去留。对应"评估后再发版"。
  # ── B. Agent-as-Code / Prompt 版本管理平台 ──
  - name: Aider
    category: Agent代码版本平台
    description: git-native AI coding 工具，AI 改的代码直接进 git，靠 git 自身做版本/回滚/diff。最轻量的"git 即版本系统"实践。
  - name: Langfuse
    category: Agent代码版本平台
    description: prompt/agent 定义版本化 + label 重指向回滚 + eval 门控，prompt-as-code 实践。
  - name: DSPy
    category: Agent代码版本平台
    description: programmatic prompt optimization，每次优化的 program 快照怎么存、怎么回退最优 checkpoint。
  # ── C. 版本与 eval 门控 ──
  - name: Promptfoo
    category: 版本与eval门控
    description: prompt/agent CI 门控，版本与 eval 绑定，不过阈值不发版。门控范式参考。
  - name: OpenHands
    category: 版本与eval门控
    description: 社区主流开源 coding agent 平台，看其 agent 定义怎么版本化、怎么防回归。
execution:
  batch_size: 3
  items_per_agent: 1
  output_dir: ./agent_harness_versioning/results
