# ─────────────────────────────────────────────────────────────
# Writer 生产部署编排
# 架构：nginx(公网) → executor(7788 /api) + evolution(7789 /evolution-api) + website(80 官网&下载)
# 桌面化改造（2026-07-07）：evolution 从"仅 loopback + SSH 隧道"改为 nginx 反代 + SSO 鉴权
# ─────────────────────────────────────────────────────────────
# 启动：docker compose up -d
# 升级：git checkout <tag> && docker compose build && docker compose up -d
# 回滚：git checkout <上个 tag> && docker compose build && docker compose up -d
#
# 桌面端改造（S7/S9/S12）：
#   - 移除原 frontend 容器（Next.js，已废弃，UI 迁入 desktop/）
#   - 新增 website 容器（Astro 静态官网 + 下载页）
#   - nginx: /api/* → executor, /download/* → 静态发布目录, / → website
# ─────────────────────────────────────────────────────────────

services:
  # ── 写作 Agent 执行端（用户用，有鉴权）──
  executor:
    build:
      context: .
      dockerfile: Dockerfile.executor
    container_name: writer-executor
    env_file:
      - executor/.env
    environment:
      # 容器内 evolution 通知地址（用 docker 服务名，非 localhost）
      - EVOLUTION_NOTIFY_URL=http://evolution:7789/api/ingestion/notify
      - EVOLUTION_URL=http://evolution:7789
      # harness 共享路径（容器内绝对路径，与下方 volumes 挂载点一致）
      - HARNESS_PACKAGE_PATH=/app/evolution/harnesses/current
      - HARNESS_BARE_REPO=/app/evolution/harness.git
      - HARNESS_CLONE_DIR=/app/executor/.harness_checkout
      - TZ=Asia/Shanghai
      # 数据目录指向 volume 挂载点（源码不挂卷，根治旧方案源码被覆盖问题）
      - DB_PATH=/app/executor/data/app.platform.core.db
      - WORKSPACE_ROOT=/app/executor/data/workspace
      # 桌面化改造（2026-07-07）：内网通知 token，与 evolution NOTIFY_TOKEN 一致。
      # 部署时在 executor/.env 里设 EVOLUTION_NOTIFY_TOKEN=<同 evolution 的 NOTIFY_TOKEN>。
      # - EVOLUTION_NOTIFY_TOKEN=<强随机 token>
      # 积分制（2026-07-09）：平台代付 key + base_url（优先于 OPENAI_API_KEY）
      - PLATFORM_API_KEY=${PLATFORM_API_KEY:-}
      - PLATFORM_BASE_URL=${PLATFORM_BASE_URL:-}
    volumes:
      # 持久化：用户库 + workspace + checkpoints（用户数据，不可丢）
      # 源码不挂卷——留在镜像里，rebuild 自动更新（根治旧方案源码被 volume 覆盖的问题）。
      # db_path/workspace_root/checkpoints 都指向 data/ 子目录。
      - executor_data:/app/executor/data
      # 共享 harness 包（evolution 编辑 → executor 同进程 import）
      - harness_data:/app/evolution/harnesses
      # 共享 harness bare repo（evolution push → executor pull）
      - harness_git:/app/evolution/harness.git
    expose:
      - "7788"
    restart: always
    # 安全加固：禁止容器内进程通过 setuid 等提权
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7788/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── 进化/监测后端（桌面化改造，2026-07-07：挂公网，nginx 反代 + SSO 鉴权）──
  evolution:
    build:
      context: .
      dockerfile: Dockerfile.evolution
    container_name: writer-evolution
    env_file:
      - evolution/.env
    environment:
      # 容器内 executor 地址（用 docker 服务名）：trace 拉取 + SSO 回调 /api/auth/me
      - EXECUTOR_URL=http://executor:7788
      - TZ=Asia/Shanghai
      # 桌面化鉴权（2026-07-07）：SSO 白名单 + 内网通知 token + 加密主密钥。
      # 这三项是安全关键，不写在 .env（避免随源码泄露），由 compose environment 注入。
      # 部署时在 evolution/.env 里设真实值，或用 Docker secrets。
      # - ALLOWED_USER_IDS=<你的 executor user_id>
      # - NOTIFY_TOKEN=<强随机 token>
      # - EVOLUTION_MASTER_KEY=<hex 64 字符>
    volumes:
      # 持久化：evolution.db（监测数据 + llm_configs 加密 key，不可丢）
      # 只挂 data/ 子目录（2026-07-08）：源码不挂卷，增量更新 build+up 即生效，
      # 避免 volume 旧源码覆盖镜像新源码。db 路径 = data/evolution.db。
      - evolution_data:/app/evolution/data
      # 共享 harness（与 executor 同一份）
      - harness_data:/app/evolution/harnesses
      - harness_git:/app/evolution/harness.git
    # 桌面化改造：改用 expose（不出宿主机端口），让 nginx 反代访问。
    # 对齐 executor 模式（expose + nginx location）。
    expose:
      - "7789"
    restart: always
    # 安全加固
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7789/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── 官网 + 下载页（Astro 静态站，nginx 托管）──
  website:
    build:
      context: .
      dockerfile: Dockerfile.website
    container_name: writer-website
    expose:
      - "80"
    restart: always
    security_opt:
      - no-new-privileges:true

  # ── 公网入口：nginx 反代 + HTTPS ──
  nginx:
    image: nginx:alpine
    container_name: writer-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # 证书：直接挂 letsencrypt 真实目录（宿主 certs/ 里的软链接容器内 follow 不到）
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # certbot webroot 验证（若用 certbot 容器签发）
      - ./certbot:/var/www/certbot:ro
      # 桌面端更新分发：latest.json + .msi + .sig（publish.sh 上传到此目录）
      - ./releases:/var/www/releases:ro
    depends_on:
      - executor
      - evolution
      - website
    restart: always
    # 安全加固：nginx 是唯一公网入口，最严格限制
    security_opt:
      - no-new-privileges:true
    # 只读根文件系统 + 临时写目录（nginx 需要 /var/cache /var/run /tmp）
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp

volumes:
  executor_data:    # executor/.env 的 db_path / workspace_root / checkpoints 都在此卷内
  evolution_data:   # evolution 的 evolution.db 在此卷内
  harness_data:     # evolution/harnesses/ 共享（executor + evolution 双向读写）
  harness_git:      # evolution/harness.git/ 共享 bare repo
