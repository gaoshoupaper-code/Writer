# ─────────────────────────────────────────────────────────────
# Writer nginx 反代配置
# 域名：siyen.site
# 架构：nginx → executor(7788, /api) + frontend(3456, /)
#       evolution(7789) 不接入 nginx（仅 docker 内网）
# ─────────────────────────────────────────────────────────────
# 证书：Let's Encrypt（certbot 签发，路径 /etc/nginx/certs/）
# 首次签发流程见 docs/deployment.md
# ─────────────────────────────────────────────────────────────

# ── map：SSE/WebSocket 连接升级（必须在 server 块之前定义）──
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── HTTP → HTTPS 强制跳转（80 端口）──
server {
    listen 80;
    listen [::]:80;
    server_name siyen.site www.siyen.site;

    # certbot webroot 验证路径（保留可访问，签发/续期用）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其余全部 301 到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS 主服务（443 端口）──
server {
    listen 443 ssl;
    http2 on;
    listen [::]:443 ssl;
    server_name siyen.site www.siyen.site;

    # ── TLS 证书（Let's Encrypt，certbot 签发后填此路径）──
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # ── TLS 安全配置 ──
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    # HSTS：强制浏览器后续都走 HTTPS（生产启用，首次确认证书无误后）
    add_header Strict-Transport-Security "max-age=31536000" always;

    # ── 安全响应头 ──
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 上游代理通用配置
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # WebSocket / SSE 升级头（写作 Agent SSE 流式必需）
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # ─────────────────────────────────────────────────────────
    # /api/* → executor（写作 Agent 后端，含 SSE 流式）
    # ─────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://executor:7788;

        # ★ SSE 关键：禁缓冲 + 长超时
        # 写作 Agent 边生成边推 token，缓冲会让流式失效、看门狗误判断连
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;     # 5 分钟，覆盖长生成
        proxy_send_timeout 300s;

        # 允许大请求体（小说生成上下文较长）
        client_max_body_size 10m;
    }

    # ─────────────────────────────────────────────────────────
    # / → 写作前端（Next.js 服务，next start）
    # ─────────────────────────────────────────────────────────
    location / {
        proxy_pass http://frontend:3456;

        # Next.js HMR（生产用不到，保留无害）+ 一般请求
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        client_max_body_size 10m;
    }

    # ─────────────────────────────────────────────────────────
    # evolution（7789）刻意不在此配置 → 公网完全不可达
    # 访问方式：SSH 隧道 ssh -L 7789:127.0.0.1:7789 user@server
    # ─────────────────────────────────────────────────────────
}
