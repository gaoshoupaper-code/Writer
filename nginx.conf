# ─────────────────────────────────────────────────────────────
# Writer nginx 反代配置
# 域名：siyen.site
# 架构：nginx → executor(7788, /api) + evolution(7789, /evolution-api) + website(80, / 官网) + /releases(更新分发)
# 桌面化改造（2026-07-07）：evolution 接入 nginx 反代（/evolution-api/*），SSO 鉴权
# ─────────────────────────────────────────────────────────────
# 证书：Let's Encrypt（certbot 签发，路径 /etc/nginx/certs/）
# 首次签发流程见 docs/deployment.md
# ─────────────────────────────────────────────────────────────

# ── map：SSE/WebSocket 连接升级（必须在 server 块之前定义）──
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── HTTP → HTTPS 强制跳转（80 端口）──
server {
    listen 80;
    listen [::]:80;
    server_name siyen.site www.siyen.site;

    # certbot webroot 验证路径（保留可访问，签发/续期用）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其余全部 301 到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS 主服务（443 端口）──
server {
    listen 443 ssl;
    http2 on;
    listen [::]:443 ssl;
    server_name siyen.site www.siyen.site;

    # ── TLS 证书（Let's Encrypt 真实路径，compose 直接挂 /etc/letsencrypt）──
    ssl_certificate     /etc/letsencrypt/live/siyen.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/siyen.site/privkey.pem;

    # ── TLS 安全配置 ──
    ssl_protocols TLSv1.2 TLSv1.3;
    # 仅留强 cipher，禁用 RC4/3DES/MD5/NULL 等弱算法
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    # OCSP 装订：加速 TLS 握手 + 隐私（容器内需显式指定 DNS 解析器）
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;
    # 隐藏 nginx 版本号（不暴露具体版本，减少被针对性攻击面）
    server_tokens off;
    # HSTS：强制浏览器后续都走 HTTPS（生产启用，首次确认证书无误后）
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── 安全响应头 ──
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 上游代理通用配置
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # WebSocket / SSE 升级头（写作 Agent SSE 流式必需）
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # ─────────────────────────────────────────────────────────
    # /api/* → executor（写作 Agent 后端，含 SSE 流式）
    # ─────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://executor:7788;

        # ★ SSE 关键：禁缓冲 + 长超时
        # 写作 Agent 边生成边推 token，缓冲会让流式失效、看门狗误判断连
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;     # 5 分钟，覆盖长生成
        proxy_send_timeout 300s;

        # 允许大请求体（小说生成上下文较长）
        client_max_body_size 10m;
    }

    # ─────────────────────────────────────────────────────────
    # /evolution-api/* → evolution（进化/监测后端，桌面化改造 2026-07-07）
    # 桌面端 evolution desktop 连此路径。rewrite 去前缀后透传到 evolution:7789，
    # 后端路由仍是 /api/*（不用感知子路径）。
    # 同域（siyen.site）→ executor 登录 cookie 天然共享给 evolution（SSO 前提）。
    # ─────────────────────────────────────────────────────────
    location /evolution-api/ {
        # rewrite 去掉 /evolution-api 前缀：/evolution-api/api/stats → /api/stats
        rewrite ^/evolution-api/(.*)$ /$1 break;
        proxy_pass http://evolution:7789;

        # ★ SSE 关键（进化/评估 session 推流，照抄 /api/ 块）
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;     # 5 分钟，靠 SSE 心跳保活
        proxy_send_timeout 300s;

        # Cookie 透传：nginx 反代默认就会把请求头（含 Cookie）随 proxy_pass 转发，
        # 无需额外指令（曾误用不存在的 proxy_pass_request_cookies，会导致 nginx 启动失败）。
        client_max_body_size 10m;
    }

    # ─────────────────────────────────────────────────────────
    # /releases/* → 桌面端更新分发（latest.json + .msi + .sig 静态文件）
    # publish.sh 上传到 ./releases/，nginx 直接托管（S7/S8）
    # ⚠️ 路径用 /releases/ 而非 /download/：后者会和官网下载页 /download
    #    （Astro 的 download/index.html）撞车——nginx 给 /download/ 自动加斜杠后
    #    命中此 location，目录列举被禁 → 下载页 403。故安装包分发独立用 /releases/。
    # ─────────────────────────────────────────────────────────
    location /releases/ {
        alias /var/www/releases/;
        # 生产关闭目录列举（旧版 autoindex on 会暴露所有安装包，泄漏版本信息）
        autoindex off;
        expires 5m;                 # latest.json 短缓存，及时拿到新版
        add_header Cache-Control "public, max-age=300";
        # .msi 大文件允许断点续传
        client_max_body_size 100m;
    }

    # ─────────────────────────────────────────────────────────
    # / → 官网（Astro 静态站，nginx 容器托管）
    # 桌面端改造（S7）：原 frontend(Next.js) 废弃，改 website(Astro)
    # ─────────────────────────────────────────────────────────
    location / {
        proxy_pass http://website:80;

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        client_max_body_size 10m;
    }

    # ─────────────────────────────────────────────────────────
    # evolution 后端（7789）现在通过 /evolution-api/* 反代访问（桌面化改造 2026-07-07）。
    # 历史的 SSH 隧道方式已废弃。鉴权由 evolution 侧 SSOAuthMiddleware 处理。
    # ─────────────────────────────────────────────────────────
}
