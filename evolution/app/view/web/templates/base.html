<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Writer 监测{% endblock %}</title>
  <!-- Chart.js via CDN：内部工具，不装 npm -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #232733;
      --border: #2d3142; --text: #e4e6eb; --text-dim: #8b8f9a;
      --accent: #5b8def; --green: #3fb950; --red: #f85149;
      --orange: #d29922; --purple: #a371f7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      line-height: 1.5; font-size: 14px;
    }
    /* ── 顶部导航 ── */
    nav {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 52px; display: flex; align-items: center; gap: 8px;
      position: sticky; top: 0; z-index: 100;
    }
    nav .brand { font-weight: 700; font-size: 15px; color: var(--accent); margin-right: 24px; }
    nav a {
      color: var(--text-dim); text-decoration: none; padding: 8px 14px;
      border-radius: 6px; font-size: 13px; transition: all .15s;
    }
    nav a:hover { color: var(--text); background: var(--surface2); }
    nav a.active { color: var(--accent); background: var(--surface2); }
    /* ── 主内容 ── */
    main { max-width: 1400px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 20px; margin-bottom: 16px; font-weight: 600; }
    h2 { font-size: 15px; margin: 24px 0 12px; color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
    /* ── 卡片网格 ── */
    .grid { display: grid; gap: 16px; }
    .grid-4 { grid-template-columns: repeat(4, 1fr); }
    .grid-2 { grid-template-columns: repeat(2, 1fr); }
    @media (max-width: 900px) { .grid-4, .grid-2 { grid-template-columns: 1fr; } }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 16px;
    }
    .stat { text-align: left; }
    .stat .label { color: var(--text-dim); font-size: 12px; text-transform: uppercase; letter-spacing: .5px; }
    .stat .value { font-size: 26px; font-weight: 700; margin-top: 6px; }
    .stat .sub { color: var(--text-dim); font-size: 12px; margin-top: 2px; }
    .value.red { color: var(--red); } .value.green { color: var(--green); }
    .value.orange { color: var(--orange); } .value.accent { color: var(--accent); }
    /* ── 表格 ── */
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
    th { color: var(--text-dim); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .5px; }
    tbody tr:hover { background: var(--surface2); }
    td a { color: var(--accent); text-decoration: none; }
    td a:hover { text-decoration: underline; }
    /* ── 徽章 ── */
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 10px;
      font-size: 11px; font-weight: 600;
    }
    .badge.failed { background: rgba(248,81,73,.15); color: var(--red); }
    .badge.completed { background: rgba(63,185,80,.15); color: var(--green); }
    .badge.running { background: rgba(91,141,239,.15); color: var(--accent); }
    .badge.flag { background: rgba(210,153,34,.15); color: var(--orange); }
    /* ── 过滤栏 ── */
    .toolbar { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
    .toolbar select, .toolbar input, .toolbar button {
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
      padding: 7px 12px; border-radius: 6px; font-size: 13px; font-family: inherit;
    }
    .toolbar button { cursor: pointer; background: var(--accent); border: none; color: #fff; }
    .toolbar button:hover { opacity: .9; }
    .toolbar button.ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    /* ── 图表容器 ── */
    .chart-box { height: 260px; position: relative; }
    /* ── 节点树 ── */
    .node-tree { font-family: "Cascadia Code", Consolas, monospace; font-size: 12px; }
    .node { padding: 5px 0; border-left: 2px solid var(--border); padding-left: 12px; margin-left: 4px; }
    .node .kind { display: inline-block; min-width: 50px; color: var(--text-dim); }
    .node .kind.agent { color: var(--accent); }
    .node .kind.llm { color: var(--purple); }
    .node .kind.tool { color: var(--green); }
    .node .kind.skill { color: var(--orange); }
    .node .kind.error { color: var(--red); }
    .node .summary { color: var(--text); }
    .node .dur { color: var(--text-dim); float: right; }
    .node.failed { border-left-color: var(--red); }
    /* ── 空状态 ── */
    .empty { text-align: center; padding: 48px; color: var(--text-dim); }
    .mono { font-family: "Cascadia Code", Consolas, monospace; }
    .muted { color: var(--text-dim); }
  </style>
</head>
<body>
  <nav>
    <span class="brand">📊 Writer 监测</span>
    <a href="/" class="{% if active == 'overview' %}active{% endif %}">概览</a>
    <a href="/traces" class="{% if active == 'traces' %}active{% endif %}">Trace</a>
    <a href="/active" class="{% if active == 'active' %}active{% endif %}">活跃</a>
    <a href="/evaluation" class="{% if active == 'evaluation' %}active{% endif %}">评估</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
