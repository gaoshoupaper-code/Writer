# 官网容器内 nginx 配置（被顶层 nginx 反代访问，不直接对外）。
# 顶层 nginx 把 /（根路径，非 /api 非 /download）反代到这个容器。

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Astro 多页静态站：/download/ → download/index.html
    # 未知路径回首页（SPA fallback 风格）
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # 静态资源缓存（Astro 构建产物带 hash，可长期缓存）
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
